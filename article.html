<style>
/* ─── ARTICLE PAGE ─── */
.article-breadcrumb {
  padding: 90px 5% 0;
  max-width: 1200px;
  margin: 0 auto;
  font-size: 0.78rem;
  color: var(--muted);
}
.article-breadcrumb a { color: var(--ocean); }
.article-breadcrumb a:hover { text-decoration: underline; }
.article-breadcrumb span { margin: 0 6px; opacity: 0.5; }

.article-container {
  max-width: 820px;
  margin: 0 auto;
  padding: 0 5% 80px;
}

.article-back {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--ocean);
  margin: 18px 0 4px;
}
.article-back:hover { text-decoration: underline; }

.article-header { padding: 20px 0 26px; }

.article-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 18px;
}

.article-type-badge {
  display: inline-block;
  font-size: 0.62rem;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 4px 13px;
  border-radius: 50px;
  color: #fff;
}
.article-type-badge.offer  { background: linear-gradient(135deg,#023E8A,#0077B6); }
.article-type-badge.news   { background: linear-gradient(135deg,#065f46,#059669); }
.article-type-badge.season { background: linear-gradient(135deg,#92400e,#d97706); }
.article-type-badge.tip    { background: linear-gradient(135deg,#1e3a5f,#2563eb); }
.article-type-badge.local  { background: linear-gradient(135deg,#14532d,#16a34a); }
.article-type-badge.event  { background: linear-gradient(135deg,#6d28d9,#7c3aed); }
.article-type-badge.war    { background: linear-gradient(135deg,#7f1d1d,#b91c1c); }

.article-date {
  font-size: 0.72rem;
  color: var(--muted);
  letter-spacing: 0.5px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.article-date::before {
  content: '';
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--ocean);
  flex-shrink: 0;
}

.article-title {
  font-family: var(--serif);
  font-size: 2.5rem;
  font-weight: 700;
  color: var(--deep);
  line-height: 1.2;
  margin-bottom: 18px;
}

.article-summary {
  font-size: 1.03rem;
  color: var(--muted);
  line-height: 1.8;
  border-left: 3px solid var(--ocean);
  padding-left: 18px;
  font-style: italic;
  margin-bottom: 0;
}

.article-hero-wrap {
  border-radius: 16px;
  overflow: hidden;
  margin: 32px 0 36px;
  box-shadow: 0 8px 36px rgba(0,119,182,0.14);
  position: relative;
}
.article-hero-wrap img {
  width: 100%;
  height: 440px;
  object-fit: cover;
  display: block;
  transition: transform 0.5s ease;
}
.article-hero-wrap:hover img { transform: scale(1.02); }

.article-body {
  font-size: 0.97rem;
  line-height: 1.9;
  color: var(--text);
}
.article-body p { margin-bottom: 20px; }
.article-body ul, .article-body ol {
  padding-left: 26px;
  margin-bottom: 20px;
}
.article-body ul { list-style: disc; }
.article-body ol { list-style: decimal; }
.article-body li { margin-bottom: 8px; color: var(--text); }
.article-body strong { color: var(--deep); font-weight: 600; }
.article-body h2 {
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--deep);
  margin: 32px 0 14px;
  line-height: 1.25;
}
.article-body h3 {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--deep);
  margin: 24px 0 10px;
}

.article-divider {
  border: none;
  border-top: 1.5px solid #e8f4fd;
  margin: 40px 0;
}

.article-cta-box {
  background: linear-gradient(135deg, var(--deep), var(--ocean));
  border-radius: 18px;
  padding: 36px 40px;
  text-align: center;
  color: #fff;
}
.article-cta-box .cta-emoji { font-size: 2rem; display: block; margin-bottom: 12px; }
.article-cta-box h3 { font-size: 1.4rem; font-weight: 700; margin-bottom: 10px; }
.article-cta-box p { font-size: 0.88rem; opacity: 0.85; margin-bottom: 22px; line-height: 1.7; max-width: 420px; margin-left: auto; margin-right: auto; }

.article-loading {
  text-align: center;
  padding: 140px 5% 80px;
  color: var(--muted);
  font-size: 0.9rem;
}
.article-loading .load-spinner {
  width: 40px; height: 40px;
  border: 3px solid #e8f4fd;
  border-top-color: var(--ocean);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 18px;
}
@keyframes spin { to { transform: rotate(360deg); } }

@media(max-width:768px){
  .article-title { font-size: 1.85rem; }
  .article-hero-wrap img { height: 260px; }
  .article-cta-box { padding: 26px 22px; }
}
@media(max-width:480px){
  .article-title { font-size: 1.5rem; }
  .article-hero-wrap img { height: 200px; }
}
</style>

<body>

<nav id="navbar"></nav>

<!-- Loading state -->
<div id="article-loading-state" class="article-loading">
  <div class="load-spinner"></div>
  <p>Loading article…</p>
</div>

<!-- Article content (hidden until loaded) -->
<div id="article-content" style="display:none">

  <div class="article-breadcrumb">
    <a href="index.html">Home</a>
    <span>›</span>
    <a href="updates.html">Updates</a>
    <span>›</span>
    <span id="bc-title">Article</span>
  </div>

  <div class="article-container">

    <a href="updates.html" class="article-back">← Back to All Updates</a>

    <div class="article-header">
      <div class="article-meta">
        <span class="article-type-badge" id="art-badge">Update</span>
        <span class="article-date" id="art-date"></span>
      </div>
      <h1 class="article-title" id="art-title"></h1>
      <p class="article-summary" id="art-summary"></p>
    </div>

    <div class="article-hero-wrap" id="art-hero-wrap" style="display:none">
      <img id="art-hero-img" src="" alt="" loading="eager">
    </div>

    <div class="article-body" id="art-body"></div>

    <hr class="article-divider">

    <div class="article-cta-box">
      <span class="cta-emoji" id="art-cta-emoji">💧</span>
      <h3 id="art-cta-heading">Need Bulk Water in Vadodara?</h3>
      <p>Reliable delivery of packaged drinking water for weddings, offices, events and homes across Vadodara.</p>
      <a id="art-cta-link" href="contact.html" class="btn-white">Order Now →</a>
    </div>

  </div>
</div>

<footer id="site-footer"></footer>
<script src="site.js"></script>
<script>
  SITE.init('updates.html');

  function setMeta(id, attr, val) {
    var el = document.getElementById(id);
    if (el) el.setAttribute(attr, val);
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  var params = new URLSearchParams(window.location.search);
  var slug = params.get('slug') || '';

  if (!slug) {
    window.location.replace('updates.html');
  }

  fetch('https://cdn.jsdelivr.net/gh/jigneshpandya86-lab/Anjani@main/updates.json')
    .then(function(r){ return r.json(); })
    .then(function(updates) {
      var art = null;
      for (var i = 0; i < updates.length; i++) {
        if (updates[i].slug === slug) { art = updates[i]; break; }
      }

      if (!art) {
        document.getElementById('article-loading-state').innerHTML =
          '<div style="font-size:2.2rem;margin-bottom:14px">😕</div>' +
          '<p style="margin-bottom:16px">Article not found.</p>' +
          '<a href="updates.html" class="btn-primary" style="margin:0 auto;display:inline-flex">← All Updates</a>';
        return;
      }

      /* ── SEO meta tags ── */
      var pageTitle = art.title + ' | Anjani Water Vadodara';
      document.getElementById('page-title').textContent = pageTitle;
      var canonUrl = 'https://anjaniwater.in/article.html?slug=' + encodeURIComponent(slug);
      setMeta('page-desc',  'content', art.metaDescription || art.body);
      setMeta('page-kw',    'content', art.keywords || 'Anjani Water, Vadodara water supplier');
      setMeta('page-canon', 'href',    canonUrl);
      var ogImg = art.image || SITE.img('hero');
      setMeta('og-title',   'content', pageTitle);
      setMeta('og-desc',    'content', art.metaDescription || art.body);
      setMeta('og-url',     'content', canonUrl);
      setMeta('og-image',   'content', ogImg);
      setMeta('tw-title',   'content', pageTitle);
      setMeta('tw-desc',    'content', art.metaDescription || art.body);
      setMeta('tw-image',   'content', ogImg);

      /* ── Schema.org NewsArticle ── */
      var schema = {
        '@context': 'https://schema.org',
        '@type': 'NewsArticle',
        'headline': art.title,
        'description': art.metaDescription || art.body,
        'datePublished': art.date,
        'dateModified': art.date,
        'image': ogImg,
        'url': canonUrl,
        'keywords': art.keywords || '',
        'author': {
          '@type': 'Organization',
          'name': 'Anjani Water Vadodara',
          'url': 'https://anjaniwater.in'
        },
        'publisher': {
          '@type': 'Organization',
          'name': 'Anjani Water Vadodara',
          'url': 'https://anjaniwater.in',
          'logo': {
            '@type': 'ImageObject',
            'url': 'https://anjaniwater.in/Images/anjani-hero.png'
          }
        },
        'mainEntityOfPage': {
          '@type': 'WebPage',
          '@id': canonUrl
        }
      };
      document.getElementById('article-schema').textContent = JSON.stringify(schema);

      /* ── BreadcrumbList Schema ── */
      var bcEl = document.createElement('script');
      bcEl.type = 'application/ld+json';
      bcEl.textContent = JSON.stringify({
        '@context': 'https://schema.org',
        '@type': 'BreadcrumbList',
        'itemListElement': [
          { '@type': 'ListItem', 'position': 1, 'name': 'Home',    'item': 'https://anjaniwater.in/' },
          { '@type': 'ListItem', 'position': 2, 'name': 'Updates', 'item': 'https://anjaniwater.in/updates.html' },
          { '@type': 'ListItem', 'position': 3, 'name': art.title, 'item': canonUrl }
        ]
      });
      document.head.appendChild(bcEl);

      /* ── Render breadcrumb & header ── */
      document.getElementById('bc-title').textContent = art.title;

      var typeLower = (art.type || 'local').toLowerCase();
      var badge = document.getElementById('art-badge');
      badge.textContent = art.tag || art.type || 'Update';
      badge.className = 'article-type-badge ' + typeLower;

      var dateStr = '';
      try {
        dateStr = new Date(art.date).toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' });
      } catch(e) { dateStr = art.date; }
      document.getElementById('art-date').textContent = dateStr;

      document.getElementById('art-title').textContent = art.title;
      document.getElementById('art-summary').textContent = art.body;

      /* ── Hero image ── */
      if (art.image) {
        var heroImg = document.getElementById('art-hero-img');
        heroImg.src = art.image;
        heroImg.alt = art.title;
        document.getElementById('art-hero-wrap').style.display = 'block';
      }

      /* ── Article body ── */
      var bodyEl = document.getElementById('art-body');
      if (art.content) {
        var paras = art.content.split(/\n\n+/);
        bodyEl.innerHTML = paras.map(function(p) {
          p = p.trim();
          if (!p) return '';
          /* If the paragraph already starts with an HTML block tag, render as-is */
          if (/^<(p|ul|ol|h[2-6]|blockquote)/i.test(p)) return p;
          return '<p>' + p + '</p>';
        }).filter(Boolean).join('');
      } else {
        /* Fallback: just show the summary body */
        bodyEl.innerHTML = '<p>' + esc(art.body) + '</p>';
      }

      /* ── CTA ── */
      document.getElementById('art-cta-emoji').textContent = art.emoji || '💧';
      if (art.cta) {
        document.getElementById('art-cta-heading').textContent = art.cta;
      }
      var ctaLink = document.getElementById('art-cta-link');
      ctaLink.href = art.ctaLink || 'contact.html';

      /* ── Show article ── */
      document.getElementById('article-loading-state').style.display = 'none';
      document.getElementById('article-content').style.display = 'block';
      SITE.initReveal();
    })
    .catch(function() {
      document.getElementById('article-loading-state').innerHTML =
        '<div style="font-size:2.2rem;margin-bottom:14px">⚠️</div>' +
        '<p style="margin-bottom:16px">Could not load this article. Please try again.</p>' +
        '<a href="updates.html" class="btn-primary" style="margin:0 auto;display:inline-flex">← All Updates</a>';
    });
</script>
</body>
</html>
