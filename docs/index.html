<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Document Example</title>
    <link rel="stylesheet" href="styles.css">

    <style>
        :root {
            --primary-color: #0056b3;
            --bg-color: #f8f9fa;
            --text-color: #333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--primary-color);
            color: white;
            padding: 1rem 2rem;
            text-align: center;
        }

        main {
            padding: 2rem;
            flex: 1; /* Pushes footer to the bottom */
            display: flex;
            flex-direction: column;
            align-items: center; /* Center content */
        }

        section {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        /* Ensure images scale down on smaller screens */
        img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
        }

        footer {
            text-align: center;
            padding: 1rem;
            background-color: #e9ecef;
            font-size: 0.9em;
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            main {
                padding: 1rem;
            }
            section {
                padding: 1rem;
            }
            header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Our Site</h1>
    </header>

    <main>
        <section>
            <h2>Features</h2>
            <p>Explore our features and see what we have to offer!</p>
            <div style="filter: drop-shadow(2px 2px 2px rgba(0, 0, 0, 0.5)); margin-top: 1rem;">
                <img src="feature.png" alt="Feature Image demonstrating our product">
            </div>
            
             <svg width="100" height="100" style="margin-top: 1rem;" viewBox="0 0 100 100">
                 <path d="M10 10 H 90 V 90 H 10 L 10 10 Z" fill="none" stroke="var(--primary-color)" stroke-width="2"/>
            </svg>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Your Company Name. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
