import fs from 'fs';

const API_KEY = process.env.GEMINI_API_KEY;

if (!API_KEY) {
  console.error("Error: GEMINI_API_KEY environment variable not set.");
  process.exit(1);
}

// 1. Calculate and define all required date variables
const now = new Date();
const today = now.toISOString().split('T')[0];
const month = now.toLocaleString('default', { month: 'long' });
const year = now.getFullYear();

// Calculate the current week range (Monday to Sunday)
const startOfWeek = new Date(now);
const dayOfWeek = now.getDay() === 0 ? 7 : now.getDay(); // Adjust Sunday (0) to 7
startOfWeek.setDate(now.getDate() - dayOfWeek + 1);

const endOfWeek = new Date(startOfWeek);
endOfWeek.setDate(startOfWeek.getDate() + 6);

const formatDate = (date) => date.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
const weekRange = `${formatDate(startOfWeek)} to ${formatDate(endOfWeek)}`;

// 2. Construct the prompt for the Gemini API
const promptText = "Today's date is " + today + ". Current week: " + weekRange + ". Month: " + month + " " + year + ".\n\n" +
  "Write a short, engaging weekly social media update for Anjani Water. Highlight our 200ml packaged water bottles and reliable water supply services for events. Keep it professional but welcoming.";

// 3. Call the Gemini API and update the JSON file
async function generateAndUpdate() {
  try {
    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        contents: [{ parts: [{ text: promptText }] }]
      })
    });

    const data = await response.json();
    
    if (!response.ok) {
        throw new Error(`API Error: ${JSON.stringify(data)}`);
    }

    const generatedText = data.candidates[0].content.parts[0].text;

    // 4. Update the JSON file
    const filePath = 'updates.json';
    let updates = [];
    
    // Read existing data if the file exists
    if (fs.existsSync(filePath)) {
      const fileData = fs.readFileSync(filePath, 'utf8');
      updates = fileData ? JSON.parse(fileData) : [];
    }

    // Create the new entry
    const newEntry = {
      date: today,
      week: weekRange,
      content: generatedText.trim()
    };

    // Add the new entry to the beginning of the array
    updates.unshift(newEntry);

    // Save the updated array back to the file
    fs.writeFileSync(filePath, JSON.stringify(updates, null, 2));
    console.log("Successfully generated and saved the new Anjani Water update to updates.json.");

  } catch (error) {
    console.error("Failed to generate update:", error);
    process.exit(1); // Exit with an error code to fail the GitHub Action
  }
}

generateAndUpdate();
